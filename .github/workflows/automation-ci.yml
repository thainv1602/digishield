# Automation CI - API (Newman) + E2E (Selenium headless).
#
# Heavier than unit CI (boots both backend + frontend), so it lives in its own
# workflow. Mirrors "GitHub Actions (3)" from the session-12 slides. Runs on:
#   - PRs into develop/main (the "green pipeline" gate for the big assignment)
#   - manual dispatch (workflow_dispatch)
#   - nightly at 01:00 Vietnam time
name: automation-ci

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *" # 18:00 UTC = 01:00 VN

permissions:
  contents: read

jobs:
  api-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1) Backend, dev profile (H2 seed), in the background
      - name: Start backend (dev profile)
        working-directory: digishield
        run: nohup ./gradlew :boot:app:bootRun --args='--spring.profiles.active=dev' --no-daemon > backend.log 2>&1 &

      # 2) Frontend dev server (:5173) in the background - Selenium targets this
      - name: Build & serve frontend
        working-directory: frontend
        run: |
          npm ci
          nohup npm run dev -- --host > frontend.log 2>&1 &

      # 3) Wait for both to be ready (up to 120s)
      - name: Wait for backend + frontend
        run: npx --yes wait-on -t 120000 http://localhost:8080/actuator/health http://localhost:5173

      # 4) API layer: smoke + input negatives (Newman)
      - name: API tests (Newman)
        working-directory: digishield/postman
        run: |
          npm install
          npm run test:api

      # 5) E2E layer: Selenium with headless Chrome (preinstalled on the runner).
      #    Non-blocking for now: AnalystBlocksAccountE2E is a REFERENCE TEMPLATE
      #    that must be hardened against the live UI (selectors, timing). It runs
      #    and uploads a failure screenshot for debugging, but does not fail the
      #    pipeline. Once a group has a verified-green scenario, drop
      #    continue-on-error so E2E becomes a real gate.
      - name: E2E tests (Selenium headless)
        continue-on-error: true
        working-directory: digishield
        run: ./gradlew :e2e:test -De2e.enabled=true -Dselenium.headless=true --no-daemon

      # 6) Keep reports + failure screenshots
      - name: Upload automation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automation-reports
          path: |
            digishield/postman/reports/
            digishield/e2e/build/screenshots/
            digishield/e2e/build/reports/tests/
          if-no-files-found: ignore
