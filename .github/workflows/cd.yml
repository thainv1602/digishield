# CD: build once, scan/sign the image, then deploy.
#   build-push -> image-scan -> sign-attest -> deploy-dev -> deploy-prod
# The image is built once (by digest); every environment deploys that exact
# digest. Production is deferred (cost) and stays OFF unless PROD_DEPLOY_ENABLED.

name: cd

on:
  push:
    branches: [main]
    paths:
      - "digishield/**"
      - "deploy/**"
      - "frontend/**"
      - "docs/DigiShield_openapi.yaml"
      - ".github/workflows/cd.yml"

permissions:
  contents: read

concurrency:
  group: cd-main
  cancel-in-progress: false # never cancel an in-flight deploy

jobs:
  # Per-arch builds on native runners (amd64 on ubuntu-latest, arm64 on the
  # free arm runner — no QEMU, EKS and the Jetson k3s cluster share one image).
  # Each arch is pushed by digest only; build-push merges them into a single
  # multi-arch manifest that scan/sign/deploy all pin to.
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform name
        id: plat
        run: echo "pair=${{ matrix.platform }}" | tr '/' '-' >> "$GITHUB_OUTPUT"

      - name: Compute image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/app

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: digishield
          file: digishield/deploy/docker/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}/app,push-by-digest=true,name-canonical=true,push=true
          provenance: true # SLSA build provenance
          sbom: true
          cache-from: type=gha,scope=${{ steps.plat.outputs.pair }}
          cache-to: type=gha,mode=max,scope=${{ steps.plat.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.plat.outputs.pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  build-push:
    name: Merge multi-arch image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.ref.outputs.image }} # immutable digest ref (manifest list)
      tag: ${{ steps.sha.outputs.short }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/app
          tags: |
            type=raw,value=latest
            type=raw,value=0.1.0-SNAPSHOT
            type=sha,format=short

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}/app@sha256:%s ' *)

      # Pin the manifest-list digest so scan/sign/deploy all act on the same bytes.
      - name: Export image ref
        id: ref
        run: |
          digest="$(docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository }}/app:sha-${{ steps.sha.outputs.short }}" \
            --format '{{ .Manifest.Digest }}')"
          echo "image=ghcr.io/${{ github.repository }}/app@${digest}" >> "$GITHUB_OUTPUT"

  image-scan:
    name: Scan image (Trivy)
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ needs.build-push.outputs.image }}
          format: sarif
          output: trivy-image.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Trivy scan (gate)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ needs.build-push.outputs.image }}
          exit-code: "1" # fail on fixable CRITICAL/HIGH
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  sign-attest:
    name: SBOM & sign (cosign)
    needs: [build-push, image-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless signing via Fulcio/Rekor
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-push.outputs.image }}
          format: cyclonedx-json
          output-file: sbom.cdx.json
          upload-artifact: true

      - name: Sign & attest
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "${{ needs.build-push.outputs.image }}"
          cosign attest --predicate sbom.cdx.json --type cyclonedx "${{ needs.build-push.outputs.image }}"

  deploy-dev:
    name: Deploy dev
    needs: [build-push, image-scan, sign-attest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC -> AWS
    environment:
      name: dev
      url: https://digishield.duckdns.org
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Set DEPLOY_ENABLED=true (+ the AWS vars/secrets below) to switch from
      # this placeholder to the real EKS deploy.
      - name: Deploy (placeholder)
        if: vars.DEPLOY_ENABLED != 'true'
        run: echo "[placeholder] would deploy ${{ needs.build-push.outputs.image }} to dev"

      - name: Configure AWS credentials (OIDC)
        if: vars.DEPLOY_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubectl & Helm
        if: vars.DEPLOY_ENABLED == 'true'
        uses: azure/setup-helm@v4

      - name: Helm deploy to EKS
        if: vars.DEPLOY_ENABLED == 'true'
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "${GHCR_PULL_TOKEN}" ]; then
            echo "::error::GHCR_PULL_TOKEN is not set (PAT with read:packages)."; exit 1
          fi
          aws eks update-kubeconfig --name "${{ vars.EKS_CLUSTER_NAME }}" --region "${{ vars.AWS_REGION }}"
          kubectl create namespace digishield-dev --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n digishield-dev create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io --docker-username=${{ github.repository_owner }} \
            --docker-password="${GHCR_PULL_TOKEN}" --dry-run=client -o yaml | kubectl apply -f -
          # --atomic auto-rolls-back a failed rollout.
          helm upgrade --install digishield digishield/deploy/helm/digishield \
            -f digishield/deploy/helm/digishield/values-dev.yaml \
            --namespace digishield-dev --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository }}/app \
            --set image.tag=sha-${{ needs.build-push.outputs.tag }} \
            --set imagePullSecrets[0].name=ghcr-pull \
            --atomic --wait --timeout 10m

      - name: Smoke test (internal readiness)
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          kubectl -n digishield-dev rollout status deploy/digishield-api --timeout=5m
          kubectl -n digishield-dev run smoke-${GITHUB_RUN_ID} \
            --rm -i --restart=Never --image=curlimages/curl:8.10.1 --quiet -- \
            curl -fsS --retry 5 --retry-delay 5 --max-time 10 \
            http://digishield-api.digishield-dev.svc.cluster.local/actuator/health/readiness

      - name: Smoke test (public ingress)
        if: vars.DEPLOY_ENABLED == 'true'
        continue-on-error: true # DNS/NLB can lag
        run: |
          curl -fsS --retry 8 --retry-delay 10 --max-time 15 https://digishield.duckdns.org/actuator/health \
            || echo "::warning::Public ingress smoke test did not pass."

      - name: Rollback on failure
        if: failure() && vars.DEPLOY_ENABLED == 'true'
        run: |
          helm history digishield --namespace digishield-dev || true
          kubectl -n digishield-dev get pods

  # Jetson k3s cluster (GitOps): CI never touches the cluster — it commits the
  # new image tag into values-jetson.yaml and ArgoCD on the cluster pulls and
  # syncs it. [skip ci] keeps the bump commit from re-triggering this workflow.
  # OFF unless the JETSON_DEPLOY_ENABLED repo variable is "true".
  deploy-jetson:
    name: Deploy jetson (GitOps tag bump)
    needs: [build-push, image-scan, sign-attest]
    if: vars.JETSON_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump image tag in values-jetson.yaml
        run: |
          f=digishield/deploy/helm/digishield/values-jetson.yaml
          sed -i -E 's|^(  tag:) .*$|\1 "sha-${{ needs.build-push.outputs.tag }}"|' "$f"
          if git diff --quiet; then
            echo "Tag unchanged; nothing to commit."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$f"
          git commit -m "chore(gitops): jetson image sha-${{ needs.build-push.outputs.tag }} [skip ci]"
          git push origin main

  # Production is deferred (cost); kept for structure, OFF by default.
  deploy-prod:
    name: Deploy production
    needs: [build-push, image-scan, sign-attest, deploy-dev]
    if: vars.PROD_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: production # required-reviewer gate pauses the run here
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (placeholder)
        if: vars.DEPLOY_ENABLED != 'true'
        run: echo "[placeholder] would deploy ${{ needs.build-push.outputs.image }} to production"

      - name: Configure AWS credentials (OIDC)
        if: vars.DEPLOY_ENABLED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up kubectl & Helm
        if: vars.DEPLOY_ENABLED == 'true'
        uses: azure/setup-helm@v4

      - name: Helm deploy to EKS
        if: vars.DEPLOY_ENABLED == 'true'
        env:
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [ -z "${GHCR_PULL_TOKEN}" ]; then echo "::error::GHCR_PULL_TOKEN is not set."; exit 1; fi
          aws eks update-kubeconfig --name "${{ vars.EKS_CLUSTER_NAME }}" --region "${{ vars.AWS_REGION }}"
          kubectl create namespace digishield-prod --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n digishield-prod create secret docker-registry ghcr-pull \
            --docker-server=ghcr.io --docker-username=${{ github.repository_owner }} \
            --docker-password="${GHCR_PULL_TOKEN}" --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install digishield digishield/deploy/helm/digishield \
            -f digishield/deploy/helm/digishield/values-prod.yaml \
            --namespace digishield-prod --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository }}/app \
            --set image.tag=sha-${{ needs.build-push.outputs.tag }} \
            --set imagePullSecrets[0].name=ghcr-pull \
            --atomic --wait --timeout 10m

      - name: Smoke test (internal readiness)
        if: vars.DEPLOY_ENABLED == 'true'
        run: |
          kubectl -n digishield-prod rollout status deploy/digishield-api --timeout=5m
          kubectl -n digishield-prod run smoke-${GITHUB_RUN_ID} \
            --rm -i --restart=Never --image=curlimages/curl:8.10.1 --quiet -- \
            curl -fsS --retry 5 --retry-delay 5 --max-time 10 \
            http://digishield-api.digishield-prod.svc.cluster.local/actuator/health/readiness

      - name: Rollback on failure
        if: failure() && vars.DEPLOY_ENABLED == 'true'
        run: helm history digishield --namespace digishield-prod || true

  # Frontend image for self-hosted clusters (Jetson): nginx + the React bundle
  # built WITHOUT Cognito vars (demo login). Same native-runner-per-arch shape
  # as the backend build. AWS keeps using S3 + CloudFront (frontend-cd.yml).
  build-frontend:
    name: Build frontend ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize platform name
        id: plat
        run: echo "pair=${{ matrix.platform }}" | tr '/' '-' >> "$GITHUB_OUTPUT"

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }}/frontend,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=frontend-${{ steps.plat.outputs.pair }}
          cache-to: type=gha,mode=max,scope=frontend-${{ steps.plat.outputs.pair }}

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/fe-digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/fe-digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: fe-digests-${{ steps.plat.outputs.pair }}
          path: ${{ runner.temp }}/fe-digests/*
          if-no-files-found: error
          retention-days: 1

  frontend-push:
    name: Merge frontend multi-arch image
    needs: build-frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/fe-digests
          pattern: fe-digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        working-directory: ${{ runner.temp }}/fe-digests
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/${{ github.repository }}/frontend:latest" \
            -t "ghcr.io/${{ github.repository }}/frontend:sha-${GITHUB_SHA::7}" \
            $(printf 'ghcr.io/${{ github.repository }}/frontend@sha256:%s ' *)
