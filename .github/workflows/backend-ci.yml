# Backend CI (Spring Boot modular monolith under digishield/)
#
# Monorepo: this workflow MUST live at the repo-root .github/workflows so
# GitHub Actions picks it up. Path filters keep it from running on FE-only
# changes; all Gradle steps run with working-directory: digishield.

name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "digishield/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "digishield/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

defaults:
  run:
    working-directory: digishield

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Fast feedback first: unit tests only (no Docker required).
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # Integration tests (Testcontainers / Docker) + coverage. GitHub's
      # ubuntu-latest runners ship Docker, so Testcontainers works out of the
      # box. `check` also re-runs checkstyle and the jacoco verification.
      - name: Run integration tests, checks & coverage
        run: ./gradlew check jacocoTestReport testCodeCoverageReport --no-daemon

      - name: Upload Checkstyle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: "digishield/**/build/reports/checkstyle/**"
          if-no-files-found: ignore

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "digishield/**/build/reports/tests/**"
          if-no-files-found: ignore

      # Per-module JaCoCo HTML/XML reports (always uploaded).
      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "digishield/**/build/reports/jacoco/**"
          if-no-files-found: ignore

      # Single cross-module aggregated coverage report.
      - name: Upload aggregated coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-coverage-report
          path: "digishield/build/reports/jacoco/testCodeCoverageReport/**"
          if-no-files-found: ignore

  image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          # Build context is the Gradle project root (digishield/), which is
          # what deploy/docker/Dockerfile copies from.
          context: digishield
          file: digishield/deploy/docker/Dockerfile
          push: false
          tags: digishield/app:0.1.0-SNAPSHOT
