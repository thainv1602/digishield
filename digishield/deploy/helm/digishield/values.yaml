image:
  repository: digishield/app
  tag: 0.1.0-SNAPSHOT
  pullPolicy: IfNotPresent

# Pull secrets for a private registry. Empty for local/on-prem (image already
# present or pulled anonymously); set per env (e.g. ghcr-pull) in values-dev/prod.
imagePullSecrets: []

api:
  replicaCount: 2
  profile: api
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # When enabled, an HPA manages replicas (the Deployment's replicas is omitted).
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 0 # 0 = disabled

# In-cluster frontend (nginx serving the React bundle). Off by default — on AWS
# the frontend is S3 + CloudFront; self-hosted clusters (Jetson) enable it and
# the Ingress then routes / to it while the API keeps /api and /actuator.
frontend:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/thainv1602/digishield/frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

worker:
  replicaCount: 1
  profile: worker
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

scheduler:
  replicaCount: 1
  profile: scheduler
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

database:
  # On AWS this is the RDS/Aurora PostgreSQL endpoint (set in values-<env>.yaml).
  url: jdbc:postgresql://postgres:5432/digishield
  username: digishield
  # Password is read from a Secret, not values. On AWS the Secret is populated
  # from Secrets Manager via External Secrets (see externalSecrets below).
  existingSecret: digishield-db
  passwordKey: password

redis:
  # On AWS this is the ElastiCache for Redis/Valkey primary endpoint.
  host: redis
  port: 6379
  tls: false
  # Leave existingSecret empty when Redis has no auth (e.g. local/dev in-cluster);
  # set it on AWS (ElastiCache auth token) so REDIS_PASSWORD is injected.
  existingSecret: ""
  passwordKey: auth-token

rabbitmq:
  # In-cluster broker host (e.g. "rabbitmq" on k3s/on-prem). Empty = no
  # SPRING_RABBITMQ_* env is injected and the app falls back to its defaults.
  host: ""
  port: 5672
  # Secret holding the broker credentials; empty = connect without SPRING_RABBITMQ_USERNAME/PASSWORD.
  existingSecret: ""
  usernameKey: username
  passwordKey: password

# External Secrets Operator: pull DB/Redis credentials from AWS Secrets Manager
# into the Secrets the workloads reference. Disabled by default (local/on-prem
# create the Secrets manually); enabled in values-dev.yaml / values-prod.yaml.
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager # a ClusterSecretStore you create on the cluster
    kind: ClusterSecretStore
  # Prefix of the secrets in AWS Secrets Manager, e.g. digishield/dev/db.
  remotePrefix: digishield/dev

flyway:
  enabled: true
  profile: flyway

# OAuth2 resource-server. issuerUri is the OIDC issuer the app validates JWTs
# against (e.g. a Cognito user pool). Empty by default; set per environment.
auth:
  issuerUri: ""

# AI (Claude). Off by default → deterministic StubAiClient (no token cost). When
# claude.enabled is true, ANTHROPIC_API_KEY is injected from a Secret (never
# values) — populate it via External Secrets (e.g. digishield/<env>/anthropic ->
# { "api-key": "sk-ant-..." }) or create the Secret manually. Model ids / timeout
# use the application.yml defaults (override with AI_CLAUDE_* env if needed).
ai:
  claude:
    enabled: false
    existingSecret: ""
    apiKeyKey: api-key

# Comma-separated browser origins (Spring origin *patterns*, so wildcards like
# https://*.trycloudflare.com work) accepted by the API in addition to its
# same-origin default. Empty = application.yml default (Vite dev server).
cors:
  origins: ""

service:
  type: ClusterIP
  port: 80

# Public ingress for the API. Disabled by default (local/on-prem reach the API
# differently); enabled on AWS so an ALB exposes it as CloudFront's /api origin.
ingress:
  enabled: false
  className: alb
  # Path prefix the API serves under (matches CloudFront's /api/* behavior and
  # the SPA's VITE_API_BASE_URL=/api/v1).
  path: /api
  # Optional host for host-based routing; empty = match all hosts on the ALB.
  host: ""
  # ALB Controller annotations (set per env in values-<env>.yaml).
  annotations: {}
