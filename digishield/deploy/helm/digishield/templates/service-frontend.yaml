{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app.kubernetes.io/name: digishield
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: digishield
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: http
{{- end }}
