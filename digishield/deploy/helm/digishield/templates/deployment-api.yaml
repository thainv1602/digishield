apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app.kubernetes.io/name: digishield
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: digishield
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: digishield
        app.kubernetes.io/component: api
    spec:
      # Kubelet-injected Docker-link vars from in-cluster Services (REDIS_PORT=tcp://...)
      # would clobber the app's ${REDIS_PORT:...} placeholders.
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--spring.profiles.active={{ .Values.api.profile }}"
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            {{- include "digishield.dbEnv" . | nindent 12 }}
            {{- include "digishield.redisEnv" . | nindent 12 }}
            {{- include "digishield.rabbitEnv" . | nindent 12 }}
            {{- include "digishield.authEnv" . | nindent 12 }}
            {{- include "digishield.aiEnv" . | nindent 12 }}
            {{- with .Values.cors.origins }}
            # Browser origins (patterns allowed) the API accepts — needed when
            # the FE is served from a public hostname (tunnel) while TLS is
            # terminated upstream, so requests are no longer seen as same-origin.
            - name: DIGISHIELD_CORS_ALLOWEDORIGINS
              value: {{ . | quote }}
            {{- end }}
          # Boot is slow on arm64 (Jetson): the app takes ~66s to start, plus
          # Flyway migrations and seeders. The startupProbe gives it up to 300s
          # (30 * 10s) to come up; liveness/readiness only begin polling once it
          # succeeds, so no initialDelaySeconds is needed on them.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
