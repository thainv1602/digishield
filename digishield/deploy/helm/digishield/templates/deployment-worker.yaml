apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    app.kubernetes.io/name: digishield
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: digishield
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: digishield
        app.kubernetes.io/component: worker
    spec:
      # Kubelet-injected Docker-link vars from in-cluster Services (REDIS_PORT=tcp://...)
      # would clobber the app's ${REDIS_PORT:...} placeholders.
      enableServiceLinks: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Processes background events/messages; no HTTP server, so no Service.
          args:
            - "--spring.profiles.active={{ .Values.worker.profile }}"
          env:
            {{- include "digishield.dbEnv" . | nindent 12 }}
            {{- include "digishield.redisEnv" . | nindent 12 }}
            {{- include "digishield.rabbitEnv" . | nindent 12 }}
            {{- include "digishield.authEnv" . | nindent 12 }}
            {{- include "digishield.aiEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
