# Jetson k3s cluster (2x Jetson 8GB, arm64) — deployed by ArgoCD, not `helm install`.
# The ArgoCD Application (deploy/gitops/jetson/apps/digishield.yaml) points at this file.
# Images must be multi-arch (linux/arm64) — built by cd.yml on the arm64 runner.

image:
  repository: ghcr.io/thainv1602/digishield/app
  # jetson-image-tag — rewritten by the cd.yml deploy-jetson job on each main build.
  tag: "latest"
  pullPolicy: Always

# The GHCR package must be public, or create this pull secret on the cluster:
#   kubectl -n digishield create secret docker-registry ghcr-pull ...
# and uncomment:
# imagePullSecrets:
#   - name: ghcr-pull

api:
  # One replica per Jetson; Traefik load-balances across both.
  replicaCount: 2
  # Real-auth mode: `pgdemo` = real Postgres + Flyway; NO `dev`, so the JWT
  # resource server (SecurityConfig) and RLS TenantFilter are active — Cognito
  # tokens are validated and @PreAuthorize/RLS enforced. `seed` re-runs the demo
  # seeders (now @Profile("dev | seed")) so the demo tenant + data exist. The app
  # connects as the superuser `digishield`; RlsTenantAspect drops to the
  # non-superuser role `digishield_app` (migration V2026.07.24.001) per request so
  # RLS actually isolates tenants. Requires auth.issuerUri below + a frontend
  # image built with the VITE_COGNITO_* vars.
  profile: pgdemo,seed
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

worker:
  replicaCount: 1

scheduler:
  replicaCount: 1

# React SPA served in-cluster by nginx; the Ingress sends / here and keeps
# /api + /actuator on the API. Image built by cd.yml (multi-arch, no Cognito
# vars → demo login).
frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/thainv1602/digishield/frontend
    tag: latest
    pullPolicy: Always

# In-cluster infra (deploy/gitops/jetson/infra), same namespace → short DNS names.
database:
  url: jdbc:postgresql://postgres:5432/digishield
  username: digishield
  existingSecret: digishield-db
  passwordKey: password

redis:
  host: redis
  port: 6379
  tls: false
  existingSecret: ""

rabbitmq:
  host: rabbitmq
  port: 5672
  existingSecret: digishield-rabbit

externalSecrets:
  enabled: false # secrets are created manually on the cluster (see JETSON_SETUP.md)

auth:
  # Cognito user pool issuer — the app validates JWTs against this OIDC issuer.
  issuerUri: "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_8nUpkhk0s"

# Public tunnels terminate TLS before Traefik, so the API sees http while the
# browser Origin is https — no longer same-origin. Allow the tunnel hostnames
# (patterns: the trycloudflare subdomain changes on every cloudflared restart).
cors:
  origins: "http://localhost:5173,https://*.ts.net,https://*.trycloudflare.com"

ai:
  claude:
    enabled: false

service:
  type: ClusterIP
  port: 80

# k3s ships Traefik bound to :80/:443 on every node → API reachable at
# http://<any-jetson-ip>/. Root path so /actuator/* is also reachable in the LAN.
ingress:
  enabled: true
  className: traefik
  path: /
  host: ""
  annotations: {}
