# Default (Vietnamese) message bundle for backend-produced, user-facing text.
# Resolved via Spring MessageSource + the request Accept-Language header (see
# Messages.java). This is the fallback bundle for every non-English locale.

# Notifications (delivered via in-app / email / SMS)
notification.reminder.title=Nhắc hoàn thành đào tạo bắt buộc
notification.reminder.body=Bạn có khoá đào tạo bắt buộc cần hoàn thành (quy tắc: {0}).
notification.enrollment.title=Bạn có khoá học mới
notification.enrollment.body=Bạn vừa được gán khoá học {0}. Hãy hoàn thành sớm nhé!

# AIDA orchestration run summaries (admin console)
aida.summary.running=Đang tính lại rủi ro và tự động đăng ký cho phạm vi "{0}"…
aida.summary.none=Không có người dùng nào trong phạm vi để đánh giá.
aida.summary.done=Đã tính lại rủi ro cho {0} người dùng, tự động đăng ký {1} người có nguy cơ cao.

# Interception decision messages (shown to the user during a transaction hold)
intervention.hold=Giao dịch đang được tạm dừng để bảo vệ bạn. Bạn đang chuyển tiền cho người nhận lần đầu trong khi đang nghe điện thoại, và tài khoản đích nằm trong danh sách cảnh báo lừa đảo. Hãy gác máy và xác minh trực tiếp trước khi tiếp tục.
intervention.watch=Cảnh báo: tài khoản đích nằm trong danh sách theo dõi. Hãy kiểm tra kỹ trước khi chuyển.
intervention.clear=Không phát hiện dấu hiệu rủi ro đáng kể.

# Admin dashboard benchmark labels
dashboard.benchmark.org=Cơ quan ABC (bạn)
dashboard.benchmark.govAvg=TB cơ quan nhà nước
dashboard.benchmark.financeAvg=TB ngành tài chính
