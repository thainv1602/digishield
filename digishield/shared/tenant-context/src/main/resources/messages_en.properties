# English message bundle. Selected when the request Accept-Language resolves to
# English (the frontend sends its current language). Keys mirror messages.properties.

# Notifications (delivered via in-app / email / SMS)
notification.reminder.title=Reminder: complete mandatory training
notification.reminder.body=You have mandatory training to complete (rule: {0}).
notification.enrollment.title=You have a new course
notification.enrollment.body=You have just been assigned the course {0}. Please complete it soon.

# AIDA orchestration run summaries (admin console)
aida.summary.running=Recomputing risk and auto-enrolling for scope "{0}"…
aida.summary.none=No users in scope to evaluate.
aida.summary.done=Recomputed risk for {0} users; auto-enrolled {1} high-risk users.

# Interception decision messages (shown to the user during a transaction hold)
intervention.hold=This transaction is being held to protect you. You are sending money to a first-time recipient while on a phone call, and the destination account is on a fraud watchlist. Hang up and verify directly before continuing.
intervention.watch=Warning: the destination account is on a watchlist. Please double-check before transferring.
intervention.clear=No significant risk signals detected.

