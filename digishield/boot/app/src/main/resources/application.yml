spring:
  application:
    name: digishield

  # Virtual threads (Java 21+ / Loom) for high-concurrency I/O.
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/digishield}
    username: ${DB_USERNAME:digishield}
    password: ${DB_PASSWORD:digishield}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

  # Redis (cache). Endpoint from env; the dev profile overrides cache.type=none.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
      timeout: 2s
  cache:
    type: ${CACHE_TYPE:redis}

  # Flyway is disabled here: migrations are applied by a dedicated job/profile,
  # not on every application boot. The migration SQL is the single source of
  # truth on the classpath at classpath:db/migration
  # (boot/app/src/main/resources/db/migration).
  flyway:
    enabled: false
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8080}

# Notification delivery. Both transports are off by default — notifications are
# persisted but nothing is sent (LoggingNotificationGateway). A RoutingNotificationGateway
# sends EMAIL via SES and SMS via SNS; enable each once the AWS side is ready
# (SES domain verified + ses:SendEmail; SNS sms + sns:Publish, both via IRSA).
digishield:
  # Auth: JWT resource server (non-dev profiles). Set the issuer to the OpenID
  # issuer of your IdP — for Amazon Cognito:
  #   https://cognito-idp.<region>.amazonaws.com/<userPoolId>
  # The server fetches that issuer's JWKS and validates signature + issuer + expiry.
  # audience is optional (matched against aud or client_id); roles-claim holds the
  # groups mapped to ROLE_* authorities. When issuer-uri is blank the API is locked
  # down (actuator only) — the permissive local experience is the dev profile.
  auth:
    jwt:
      issuer-uri: ${AUTH_JWT_ISSUER_URI:}
      audience: ${AUTH_JWT_AUDIENCE:}
      roles-claim: ${AUTH_JWT_ROLES_CLAIM:cognito:groups}
  notifications:
    email:
      from: ${NOTIFICATIONS_EMAIL_FROM:no-reply@digishield.duckdns.org}
      ses:
        enabled: ${NOTIFICATIONS_SES_ENABLED:false}
    sms:
      # Optional alphanumeric sender id (region/route dependent; blank = none).
      sender-id: ${NOTIFICATIONS_SMS_SENDER_ID:}
      sns:
        enabled: ${NOTIFICATIONS_SNS_ENABLED:false}
  # AI: off by default → deterministic StubAiClient (no token cost). Set true and
  # provide ANTHROPIC_API_KEY to route classify/moderate/generate through Claude.
  ai:
    claude:
      enabled: ${AI_CLAUDE_ENABLED:false}
    # ML: self-hosted phishing classifier (research/service/phishing-ai). When on,
    # classify() hits the fine-tuned models first and escalates to Claude/Stub on
    # low confidence, escalate=true, or any error. moderate()/generate() delegate.
    ml:
      enabled: ${AI_ML_ENABLED:false}
      base-url: ${AI_ML_BASE_URL:http://localhost:8085}
      min-confidence: ${AI_ML_MIN_CONFIDENCE:0.6}
      timeout-ms: ${AI_ML_TIMEOUT_MS:2000}

---
# API run mode
spring:
  config:
    activate:
      on-profile: api

---
# Worker run mode
spring:
  config:
    activate:
      on-profile: worker

---
# Scheduler run mode
spring:
  config:
    activate:
      on-profile: scheduler

---
# Flyway migration run mode (used by the migration job)
spring:
  config:
    activate:
      on-profile: flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
