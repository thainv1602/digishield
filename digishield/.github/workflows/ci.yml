name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if absent)
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.11
          fi

      # Fast feedback first: unit tests only (no Docker required).
      - name: Run unit tests
        run: ./gradlew test --no-daemon

      # Integration tests (Testcontainers / Docker) + coverage. GitHub's
      # ubuntu-latest runners ship Docker, so Testcontainers works out of the
      # box. `check` also re-runs checkstyle and the jacoco verification.
      - name: Run integration tests, checks & coverage
        run: ./gradlew check jacocoTestReport testCodeCoverageReport --no-daemon

      - name: Upload Checkstyle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: checkstyle-reports
          path: "**/build/reports/checkstyle/**"
          if-no-files-found: ignore

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/**"
          if-no-files-found: ignore

      # Per-module JaCoCo HTML/XML reports (always uploaded).
      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: "**/build/reports/jacoco/**"
          if-no-files-found: ignore

      # Single cross-module aggregated coverage report.
      - name: Upload aggregated coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-coverage-report
          path: "build/reports/jacoco/testCodeCoverageReport/**"
          if-no-files-found: ignore

  image:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: false
          tags: digishield/app:0.1.0-SNAPSHOT
