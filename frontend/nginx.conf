# SPA config: every non-file route falls back to index.html (React Router).
# /api and /actuator never reach nginx — the k8s Ingress routes them to the
# API service first.
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets are immutable; index.html must always revalidate.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
